services:
  - type: web
    name: screenwatch-web
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn screenwatch_web.wsgi:application"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SCREENWATCH_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        value: "drmpcjly"
      - key: CLOUDINARY_API_KEY
        value: "918842319149244"
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"
